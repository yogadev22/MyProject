name: Android CMake

on:
  push:
    branches: ["main"]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Install Ninja
      run: sudo apt install -y ninja-build wget

    - name: Cache Android NDK
      id: cache-ndk
      uses: actions/cache@v4
      with:
        path: $HOME/android-ndk-r26d
        key: ndk-r26d

    - name: Setup Android NDK
      if: steps.cache-ndk.outputs.cache-hit != 'true'
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r26d-linux.zip
        unzip android-ndk-r26d-linux.zip
        mv android-ndk-r26d $HOME/

    - name: Cache Build
      uses: actions/cache@v4
      with:
        path: build
        key: ninja-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
         
    - name: Configure
      run: |
        if [ ! -f build/CMakeCache.txt ]; then
        mkdir build
        cd build
        cmake .. -G Ninja \
        -DCMAKE_TOOLCHAIN_FILE=$HOME/android-ndk-r26d/build/cmake/android.toolchain.cmake \
        -DANDROID_ABI=arm64-v8a \
        -DANDROID_PLATFORM=android-21 \
        -DANDROID_STL=c++_static
        fi

    - name: Build
      run: |
        cd build
        ninja

    - name: Upload Artifact
      uses: actions/upload-artifact@v4
      with:
         name: lib
         path: build/*.so
